name: CI
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  linux:

    strategy:
      fail-fast: false
      matrix:
        flavor: [Debug, Release]

    name: Build & Lint (${{ matrix.flavor }})
    runs-on: ubuntu-26.04

    env:
      CLICOLOR_FORCE: "1"

    steps:

    - name: Checkout
      uses: actions/checkout@v7
      with:
          clean: false
          show-progress: false

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: 'latest'
        # No cache, there are complaints about lockfiles that we don't want otherwise. See <https://github.com/actions/setup-node/issues/928>.
        # cache: 'npm'

    - name: Install prerequisites
      run: |
        set -ex
        # Install buildcache.
        mkdir -p ~/.local
        wget https://gitlab.com/bits-n-bites/buildcache/-/releases/v0.33.0/downloads/buildcache-linux-amd64.tar.gz
        tar xvf buildcache-linux-amd64.tar.gz -C ~/.local --strip-components=1
        buildcache -V
        # Install linters and build dependencies.
        packages=(
          clang-tidy
          cppcheck
          jq
          libfreetype-dev
          libfribidi-dev
          libharfbuzz-dev
          libjpeg-turbo8-dev
          libmd4c-dev
          libmd4c-html0-dev
          libpng-dev
          libunibreak-dev
          libutf8proc-dev
          libwebp-dev
          libxml2-utils
          libxxhash-dev
          libzstd-dev
        )
        sudo apt-get update && sudo apt-get install --no-install-recommends "${packages[@]}"
        # Get a more recent version of cppcheck (for `--exitcode-suppress=…` support).
        wget http://archive.ubuntu.com/ubuntu/pool/universe/c/cppcheck/cppcheck_2.21.0-1_amd64.deb
        # We need a more recent version of libunibreak for `lb_get_char_class` support.
        wget http://mirrors.kernel.org/ubuntu/pool/universe/libu/libunibreak/libunibreak{6,-dev}_6.1-2_amd64.deb
        sudo dpkg -i *.deb
        # Install stylelint.
        npm init --yes
        npm install @csstools/stylelint-formatter-github stylelint stylelint-config-standard

    - name: Cache buildcache directory
      uses: actions/cache@v6
      with:
        path: bcache
        key: ${{ runner.os }}-bcache-${{ matrix.flavor }}-${{ github.sha }}
        restore-keys: ${{ runner.os }}-bcache-${{ matrix.flavor }}-

    - name: Setup problem matchers
      run: |
        set -x
        echo '::remove-matcher owner=eslint-compact::'
        echo '::remove-matcher owner=eslint-stylish::'
        echo '::remove-matcher owner=tsc::'
        echo '::add-matcher::.github/problem-matchers.json'

    - name: Configure
      run: |
        cmake -B build -S . -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.flavor }} \
          -DCMAKE_COLOR_DIAGNOSTICS=ON 2>&1
        printf '%s\n' NINJA_STATUS="$(printf '\e[32;1m%%p⎹\e[0m ')" >>"${GITHUB_ENV}"
        printf '%s\n' BUILDCACHE_DIR="$PWD/bcache" >>"${GITHUB_ENV}"

    - name: Build
      run: ninja -C build -k0 2>&1

    - name: Lint
      run: ninja -C build lint -k0 2>&1
